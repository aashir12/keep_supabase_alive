name: Keep Supabase Alive IMMOTOOLS
on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/keep-alive.yml'
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_IMMOTOOLS }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_IMMOTOOLS }}
        run: |
          curl "${SUPABASE_URL}/rest/v1/user_subs?select=count" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --fail --silent --show-error
          echo "✅ Supabase pinged successfully!"