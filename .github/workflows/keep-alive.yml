name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/keep-alive.yml'

env:
  SUPABASE_URL: "https://jmwshthfzhztfmfkossk.supabase.co"
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptd3NodGhmemh6dGZtZmtvc3NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2Nzc3MzcsImV4cCI6MjA4MjI1MzczN30.xSYt2oU9BWQAOjo0C4IwngIy4agJUOVGSGkbQCxdNqw"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl "${SUPABASE_URL}/rest/v1/calculator_responses?select=count" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --fail --silent --show-error
          echo "✅ Supabase pinged successfully!"