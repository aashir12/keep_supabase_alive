name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC — well within the 7-day inactivity window
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping-supabase:
    name: Ping Supabase to prevent auto-pause
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase project to keep it alive..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $RESPONSE"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✅ Supabase is alive and responding!"
          elif [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 400 ] || [ "$RESPONSE" -eq 404 ]; then
            echo "✅ Supabase responded (project is active)."
          else
            echo "⚠️ Unexpected response code: $RESPONSE"
            exit 1
          fi

      - name: Log timestamp
        run: echo "Keep-alive ping sent at $(date -u)"
